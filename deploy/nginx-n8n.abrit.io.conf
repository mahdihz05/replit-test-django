upstream mohtavayar_app {
    server unix:/run/mohtavayar/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name n8n.abrit.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name n8n.abrit.io;

    ssl_certificate /etc/letsencrypt/live/n8n.abrit.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.abrit.io/privkey.pem;

    root /var/www/mohtavayar/artifacts/frontend/dist/public;
    index index.html;
    client_max_body_size 500M;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://mohtavayar_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
        proxy_read_timeout 180s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 180s;
    }

    location /admin/ {
        proxy_pass http://mohtavayar_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /media/ {
        alias /var/www/mohtavayar/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /static/ {
        alias /var/www/mohtavayar/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

