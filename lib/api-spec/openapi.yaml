openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /workspaces/{workspace_id}/channels/{channel_id}/wordpress/capabilities/:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/ChannelId"
    get:
      operationId: getWordpressCapabilities
      summary: Get discovered WordPress content types and taxonomies
      responses:
        "200":
          description: WordPress capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordPressCapabilitiesResponse"
    post:
      operationId: refreshWordpressCapabilities
      summary: Refresh WordPress content types and taxonomies
      responses:
        "200":
          description: Refreshed WordPress capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordPressCapabilitiesResponse"
  /workspaces/{workspace_id}/publish/now/:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    post:
      operationId: publishNow
      summary: Publish content to selected channels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRequest"
      responses:
        "200":
          description: Per-channel publish results
  /workspaces/{workspace_id}/publish/schedule/:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    post:
      operationId: schedulePublish
      summary: Schedule content for selected channels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduledPublishRequest"
      responses:
        "200":
          description: Scheduled jobs
components:
  parameters:
    WorkspaceId:
      name: workspace_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ChannelId:
      name: channel_id
      in: path
      required: true
      schema: { type: string, format: uuid }
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    WordPressTerm:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        parent: { type: integer }
      required: [id, name]
    WordPressTaxonomy:
      type: object
      properties:
        slug: { type: string }
        name: { type: string }
        rest_base: { type: string }
        hierarchical: { type: boolean }
        types: { type: array, items: { type: string } }
        terms:
          { type: array, items: { $ref: "#/components/schemas/WordPressTerm" } }
    WordPressPostType:
      type: object
      properties:
        slug: { type: string }
        name: { type: string }
        rest_base: { type: string }
        supports: { type: object, additionalProperties: true }
        taxonomies: { type: array, items: { type: string } }
    WordPressCapabilitiesResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            status: { type: string }
            site_name: { type: string }
            site_url: { type: string, format: uri }
            synced_at: { type: [string, "null"], format: date-time }
            capabilities:
              type: object
              properties:
                post_types:
                  {
                    type: array,
                    items: { $ref: "#/components/schemas/WordPressPostType" },
                  }
                taxonomies:
                  type: object
                  additionalProperties:
                    { $ref: "#/components/schemas/WordPressTaxonomy" }
    WordPressPublishOptions:
      type: object
      properties:
        post_type: { type: string, default: post }
        status:
          { type: string, enum: [draft, pending, publish], default: draft }
        excerpt: { type: string }
        slug: { type: string }
        featured_attachment_id: { type: string, format: uuid }
        taxonomy_terms:
          type: object
          additionalProperties:
            type: array
            items: { type: integer }
    PublishRequest:
      type: object
      required: [channel_ids]
      properties:
        content_id: { type: string, format: uuid }
        custom_text: { type: string }
        channel_ids:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
        attachments:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              media_type:
                { type: string, enum: [image, video, voice, document] }
        wordpress_options:
          type: object
          description: WordPress options keyed by publish channel UUID
          additionalProperties:
            { $ref: "#/components/schemas/WordPressPublishOptions" }
    ScheduledPublishRequest:
      allOf:
        - $ref: "#/components/schemas/PublishRequest"
        - type: object
          required: [scheduled_at]
          properties:
            scheduled_at:
              type: string
              format: date-time
